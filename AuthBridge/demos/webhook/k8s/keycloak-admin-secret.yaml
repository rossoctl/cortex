# Keycloak Admin Secret for Kagenti Webhook
# Required by the kagenti-client-registration sidecar injected by the webhook.
#
# ⚠️  DEMO/DEVELOPMENT ONLY - DO NOT USE IN PRODUCTION
# For production, use proper secret management (sealed-secrets, external-secrets, vault, etc.)
#
# Usage:
#   kubectl apply -f keycloak-admin-secret.yaml -n <namespace>
#
# This secret must exist in any namespace where the webhook injects sidecars.
# The kagenti-client-registration sidecar reads KEYCLOAK_ADMIN_USERNAME and
# KEYCLOAK_ADMIN_PASSWORD from this secret to register agents as OAuth clients.

---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: team1  # Update this to match your target namespace
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
