# mTLS demo — caller pod.
#
# Operator-injected authbridge sidecar (rossoctl.io/inject=enabled);
# SPIRE enabled (rossoctl.io/spire=enabled) so spiffe-helper writes
# the X.509 SVID files authbridge consumes for mTLS. The "demo-app"
# container is just curl in a sleep loop — the demo's verify scripts
# kubectl-exec into it.
#
# After deploy, scripts/patch-mtls-config.sh patches the operator-
# rendered authbridge config to add `mtls: { mode: <mode> }`.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtls-caller
  namespace: team1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtls-caller
  namespace: team1
  labels:
    app.kubernetes.io/name: mtls-caller
    app.kubernetes.io/part-of: mtls-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mtls-caller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtls-caller
        app.kubernetes.io/part-of: mtls-demo
        rossoctl.io/inject: enabled
        rossoctl.io/spire: enabled
    spec:
      serviceAccountName: mtls-caller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "while true; do sleep 30; done"]
          env:
            - name: HTTP_PROXY
              value: "http://localhost:8081"
            - name: http_proxy
              value: "http://localhost:8081"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            # curlimages/curl USERs as the non-numeric `curl_user`;
            # an explicit numeric runAsUser is required for the
            # kubelet's runAsNonRoot check to pass.
            runAsUser: 100
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: shared-data
              mountPath: /shared
      volumes:
        - name: shared-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mtls-caller
  namespace: team1
  labels:
    app.kubernetes.io/name: mtls-caller
    app.kubernetes.io/part-of: mtls-demo
spec:
  selector:
    app.kubernetes.io/name: mtls-caller
  ports:
    - port: 8080
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP

---
# AgentRuntime enrolls this workload with the operator. The operator
# applies rossoctl.io/type=agent to the Deployment and Pod template,
# which triggers webhook sidecar injection and Keycloak client registration.
apiVersion: agent.rossoctl.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: mtls-caller
  namespace: team1
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mtls-caller
