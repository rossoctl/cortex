# Weather MCP tool with AuthBridge + SPIRE (inbound JWT at Envoy before the MCP server).
#
# Prerequisites: Kagenti platform, webhook, SPIRE, namespace team1, ConfigMaps
# from the installer (authbridge-config, envoy-config, spiffe-helper-config).
#
# The MCP server listens on port 8000. AuthBridge ext_proc listens on 9090
# inside the pod, so there is no port collision (unlike the GitHub tool on 9090).
#
# The kagenti-operator's AgentRuntime CR (agentruntime-weather-tool-advanced.yaml)
# enrolls this workload and triggers AuthBridge sidecar injection. The
# AgentRuntime uses type "agent" so the operator applies kagenti.io/type=agent
# to the pod (the injectTools feature gate is off by default). This workload
# is still the weather MCP tool by image and Deployment name; it is enrolled
# as type "agent" so client-registration runs and registers the tool's
# SPIFFE identity in Keycloak.
#
# Usage:
#   kubectl apply -f weather-tool-advanced.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weather-tool-advanced
  namespace: team1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-tool-advanced
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-tool-advanced
    app.kubernetes.io/component: mcp-tool
    protocol.kagenti.io/mcp: ""
    kagenti.io/transport: streamable_http
spec:
  # Default Deployment progress deadline is 600s; cold ghcr + webhook restart + many
  # sidecars in Kind can exceed that before the old ReplicaSet pod drains.
  progressDeadlineSeconds: 1800
  replicas: 1
  # Default RollingUpdate can leave the new pod Pending (Insufficient cpu) on a
  # single Kind node while the old multi-sidecar pod still runs. Recreate serializes.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-tool-advanced
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-tool-advanced
        app.kubernetes.io/component: mcp-tool
        protocol.kagenti.io/mcp: ""
        kagenti.io/transport: streamable_http
        kagenti.io/inject: enabled
        kagenti.io/spire: enabled
    spec:
      serviceAccountName: weather-tool-advanced
      # Must match the image (Dockerfile USER 1001). Pod-level runAsNonRoot alone can
      # leave the process with a different UID (e.g. namespace range), breaking
      # read/execute of files under /app and causing CrashLoopBackOff.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          image: ghcr.io/kagenti/agent-examples/weather_tool:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
            - name: UV_NO_CACHE
              value: "1"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: cache
              mountPath: /app/.cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: weather-tool-advanced-mcp
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-tool-advanced
    protocol.kagenti.io/mcp: ""
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: weather-tool-advanced
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
