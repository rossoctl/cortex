# Weather A2A agent with AuthBridge + SPIRE and outbound token exchange to the
# advanced weather tool (see configmaps-advanced.yaml and setup_keycloak_weather_advanced.py).
#
# Ollama on the host: set LLM_* env vars for your cluster. Port 11434 must be
# excluded from AuthBridge interception (annotation below).
#
# Usage:
#   kubectl apply -f weather-service-advanced.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weather-service-advanced
  namespace: team1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service-advanced
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-service-advanced
spec:
  # Match tool deployment: slow Kind rollouts can hit the 600s default.
  progressDeadlineSeconds: 1800
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-service-advanced
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        app.kubernetes.io/name: weather-service-advanced
        kagenti.io/inject: enabled
        kagenti.io/spire: enabled
      annotations:
        kagenti.io/outbound-ports-exclude: "11434"
    spec:
      serviceAccountName: weather-service-advanced
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: ghcr.io/kagenti/agent-examples/weather_service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /app/.cache
            - name: marvin
              mountPath: /.marvin
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
            - name: UV_CACHE_DIR
              value: "/app/.cache"
            - name: MCP_URL
              value: "http://weather-tool-advanced-mcp:8000/mcp"
            # Default to host Ollama (Kind / Docker Desktop). Override for OpenAI.
            - name: LLM_API_BASE
              value: "http://host.docker.internal:11434/v1"
            - name: LLM_API_KEY
              value: "ollama"
            - name: LLM_MODEL
              value: "llama3.2:3b-instruct-fp16"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: cache
          emptyDir: {}
        - name: marvin
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: weather-service-advanced
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-service-advanced
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: weather-service-advanced
  ports:
    - name: http
      port: 8080
      targetPort: 8000
      protocol: TCP
