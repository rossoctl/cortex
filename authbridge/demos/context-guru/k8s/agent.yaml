# A finance agent + a context-guru-enabled AuthBridge sidecar, deployed WITHOUT
# the operator's mutating webhook (no kagenti.io/inject label) so the demo owns
# both containers and the /etc/authbridge/config.yaml.
#
# The agent's outbound LLM traffic (OpenAI /v1/chat/completions to Ollama) is
# routed through the sidecar forward proxy (HTTP_PROXY=:8081), where context-guru
# compacts the tool-output context. MCP + everything else passes through.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-finance-agent
  namespace: team1
  labels: { app.kubernetes.io/name: cg-finance-agent }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: cg-finance-agent } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cg-finance-agent
        protocol.kagenti.io/a2a: ""
        # deliberately NO kagenti.io/inject -> the operator webhook does not inject a sidecar
    spec:
      containers:
        - name: agent
          image: finance-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: PORT, value: "8001" }                       # agent behind the sidecar reverse proxy
            - { name: HTTP_PROXY,  value: "http://127.0.0.1:8081" } # LLM/MCP egress via the forward proxy
            - { name: HTTPS_PROXY, value: "http://127.0.0.1:8081" }
            - { name: NO_PROXY, value: "127.0.0.1,localhost" }
            - { name: OLLAMA_URL, value: "http://192.168.5.2:11434" }  # host Ollama (OpenAI /v1 endpoint)
            # llama3.2:3b works for the compaction demo. For the "exceeds the context
            # window" contrast, run.sh creates a small-window variant (llama3.2-ctx12k,
            # num_ctx=12288) and points OLLAMA_MODEL at it so the raw ~18K-token request
            # truncates without context-guru but the compacted ~10K request fits.
            - { name: OLLAMA_MODEL, value: "llama3.2:3b" }
            - { name: FINANCE_MCP_URL, value: "http://finance-mcp.team1.svc.cluster.local:8888" }
            - { name: AGENT_PUBLIC_URL, value: "http://cg-finance-agent.team1.svc.cluster.local:8080/" }
          volumeMounts: [{ mountPath: /shared, name: shared-data }]
        - name: authbridge-proxy
          image: authbridge-cg:latest       # authbridge-proxy built with the context-guru plugin (see run.sh)
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/authbridge/config.yaml"]
          env:
            - { name: CG_MODEL_BASE, value: "https://ete-litellm.ai-models.vpc-int.res.ibm.com" }
            - { name: CG_MODEL_NAME, value: "claude-haiku-4-5" }   # capable, cheap extract-code model
            - name: CG_MODEL_KEY
              valueFrom: { secretKeyRef: { name: cg-model-key, key: key } }
          ports: [{ containerPort: 8080 }, { containerPort: 8081 }, { containerPort: 9094 }]
          volumeMounts: [{ mountPath: /etc/authbridge, name: ab-config }]
      volumes:
        - { name: shared-data, emptyDir: {} }
        - { name: ab-config, configMap: { name: cg-authbridge-config } }
---
apiVersion: v1
kind: Service
metadata: { name: cg-finance-agent, namespace: team1, labels: { app.kubernetes.io/name: cg-finance-agent } }
spec:
  selector: { app.kubernetes.io/name: cg-finance-agent }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]   # -> sidecar reverse proxy -> agent :8001
