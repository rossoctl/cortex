# authbridge-cpex gateway — sidecar-shape Deployment.
#
# The authbridge.yaml ConfigMap below carries the AuthBridge config
# (mode, listeners, pipeline). The cpex-policy ConfigMap (created by
# the Makefile from k8s/cpex-policy.yaml) carries the CPEX runtime
# YAML — what CPEX itself parses. Both mount as files; the AuthBridge
# config references cpex-policy via config_file.
#
# Image: authbridge-cpex:dev — built locally and loaded into kind via
# `kind load docker-image authbridge-cpex:dev --name kagenti`.

apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: cpex-demo
data:
  authbridge.yaml: |
    mode: proxy-sidecar
    listener:
      # Reverse proxy fronts hr-mcp inside the cluster.
      reverse_proxy_addr: ":8080"
      reverse_proxy_backend: "http://hr-mcp.cpex-demo:9100"
      forward_proxy_addr: ":8081"
      # Session API and stats bind to localhost only — both expose raw
      # user content / internal state and have no auth. Reach them via
      # `kubectl port-forward` (works against the pod regardless of
      # Service ports), never cluster-wide.
      session_api_addr: "127.0.0.1:9094"
    stats:
      stats_address: "127.0.0.1:9093"
    session:
      enabled: true
      ttl: 30m
    pipeline:
      inbound:
        plugins:
          # mcp-parser populates pctx.Extensions.MCP from the
          # JSON-RPC body; cpex reads from there for CMF dispatch.
          - name: mcp-parser
          # cpex handles identity, policy, delegation entirely via
          # its own sub-plugins (apl.identity.jwt, apl.pdp.cedar,
          # apl-delegator-oauth, validator/pii-scan, audit/logger).
          # The CPEX-side YAML lives in cpex-policy ConfigMap,
          # mounted at /etc/cpex/cpex.yaml.
          - name: cpex
            config:
              hooks:
                on_request:
                  - cmf.tool_pre_invoke
                on_response:
                  - cmf.tool_post_invoke
              config_file: /etc/cpex/cpex.yaml
              fail_open: false
              # Bypass paths get stripped before CPEX evaluation so
              # health probes and discovery never pay the FFI cost.
              # Bypass hosts default covers keycloak/SPIRE/observability.
      outbound:
        plugins: []

---
apiVersion: v1
kind: Service
metadata:
  name: authbridge-cpex
  namespace: cpex-demo
spec:
  selector:
    app.kubernetes.io/name: authbridge-cpex
  ports:
    # Only the reverse proxy is exposed cluster-wide. Session API (9094)
    # and stats (9093) bind to localhost in the config above and are
    # reached via `kubectl port-forward` against the pod, so they are
    # deliberately NOT listed here.
    - name: reverse-proxy
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authbridge-cpex
  namespace: cpex-demo
  labels:
    app.kubernetes.io/name: authbridge-cpex
    app.kubernetes.io/part-of: cpex-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authbridge-cpex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authbridge-cpex
        app.kubernetes.io/part-of: cpex-demo
    spec:
      containers:
        - name: authbridge-cpex
          image: authbridge-cpex:dev
          imagePullPolicy: Never
          args:
            - "--config"
            - "/etc/authbridge/authbridge.yaml"
          env:
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: reverse-proxy
              containerPort: 8080
            - name: forward-proxy
              containerPort: 8081
            - name: session-api
              containerPort: 9094
            - name: stats
              containerPort: 9093
            - name: health
              containerPort: 9091
          volumeMounts:
            - name: authbridge-config
              mountPath: /etc/authbridge
              readOnly: true
            - name: cpex-policy
              mountPath: /etc/cpex
              readOnly: true
          readinessProbe:
            # /readyz gates on plugin readiness (ANDs Ready() across
            # plugins); /healthz is always 200 and only fits liveness.
            httpGet:
              path: /readyz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: authbridge-config
          configMap:
            name: authbridge-config
        - name: cpex-policy
          configMap:
            name: cpex-policy
