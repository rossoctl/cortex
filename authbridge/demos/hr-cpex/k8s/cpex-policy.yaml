# CPEX runtime config for the HR demo.
#
# DEMO ONLY — points at a local Keycloak over plaintext http. Do NOT use
# in production without TLS to the IdP.
#
# The gateway client secret is sourced with `client_secret_source.kind: file`
# from a mounted Secret (see the cpex-gateway-secret Secret + /etc/cpex-secrets
# mount in k8s/30-agent.yaml), so the secret value is NOT inlined in this
# policy manifest. The `literal` and `env_var` source kinds also exist; file
# is the production-shaped one.
#
# ── How to read this file ───────────────────────────────────────────
# The `routes:` block at the BOTTOM is the story: three tool routes,
# one per demo act, each spelling out the authorization chain for that
# tool. Read those first. Everything above them is the toolbox the
# routes pull from:
#
#   plugins:         2 identities (jwt-user, jwt-client)
#                    2 delegators (workday-oauth, github-oauth)
#                    2 validators (pii-scan, audit-log)
#   global.apl.pdp:  1 Cedar PDP (relationship-based authorization)
#
# Each route names the identities it needs in its `authentication:`
# block and lists its ordered authorization effects under
# `authorization.pre_invocation:`. Plugins otherwise resolve by name +
# hook, so the grouping above is purely for reading.
#
# Syntax note: this file uses the CPEX v0.2.2 *canonical* APL shape —
# per-route `authentication:` + `authorization:` sibling blocks, no
# `apl:` wrapper, `args:`/`result:` as route-level siblings, and `run(...)`
# to invoke a plugin as an effect (the old `plugin(...)` spelling still
# works as an alias). The pre-0.2.1 `identity:` / `policy:` keys are hard
# errors now.
# ────────────────────────────────────────────────────────────────────
#
# Keycloak runs locally at http://localhost:8081. JWTs are RS256-signed
# by the realm's automatically-generated signing key. We point at the
# realm's JWKS URL so the resolver fetches the active public key at
# init time (no manual PEM paste).

plugin_settings:
  routing_enabled: true

plugins:
  # ── IDENTITY ─────────────────────────────────────────────────────
  # Two JWT resolvers fire on identity.resolve: the human user's token
  # (X-User-Token) and the agent's client token (Authorization). Both
  # verify against the realm JWKS. Each route lists the ones it needs in
  # its `authentication:` block.

  # User identity. Carries the human's roles + permissions claims.
  - name: jwt-user
    kind: identity/jwt
    hooks: [identity.resolve]
    on_error: fail
    config:
      role: user
      header: X-User-Token
      trusted_issuers:
        - issuer: "http://keycloak.cpex-demo:8080/realms/cpex-demo"
          audiences: ["cpex-gateway"]
          algorithms: ["RS256"]
          decoding_key:
            kind: jwks_url
            url: "http://keycloak.cpex-demo:8080/realms/cpex-demo/protocol/openid-connect/certs"
            # Cluster-internal http is intentional — Keycloak runs
            # in the same namespace and isn't TLS-terminated.
            insecure_http: true
          leeway_seconds: 60
      claim_mapper: standard

  # Client identity. Carries the agent's client_id / azp.
  - name: jwt-client
    kind: identity/jwt
    hooks: [identity.resolve]
    on_error: fail
    config:
      role: client
      header: Authorization
      trusted_issuers:
        - issuer: "http://keycloak.cpex-demo:8080/realms/cpex-demo"
          audiences: ["cpex-gateway", "account"]
          algorithms: ["RS256"]
          decoding_key:
            kind: jwks_url
            url: "http://keycloak.cpex-demo:8080/realms/cpex-demo/protocol/openid-connect/certs"
            # Cluster-internal http is intentional — Keycloak runs
            # in the same namespace and isn't TLS-terminated.
            insecure_http: true
          leeway_seconds: 60
      claim_mapper: standard

  # ── DELEGATORS (RFC 8693 token exchange) ─────────────────────────
  # Two OAuth delegators, one per downstream audience. A route's
  # delegate(...) step names which one to invoke.

  # RFC 8693 token-exchange delegator. Trades the user's hr-copilot
  # token for a workday-api-audience-scoped access token.
  #
  # Pattern 1 (workday flow): the user already carries view_ssn etc.
  # as a Keycloak user attribute → claim. The exchange just changes
  # the audience; the perms come along for the ride.
  - name: workday-oauth
    kind: delegator/oauth
    hooks: [token.delegate]
    on_error: fail   # delegation failure must BLOCK the call — get_compensation
                     # has no require(delegation.granted) post-check, so without
                     # this a failed token exchange would fail open.
    capabilities:
      - read_inbound_credentials
      - write_delegated_tokens
    config:
      token_endpoint: "http://keycloak.cpex-demo:8080/realms/cpex-demo/protocol/openid-connect/token"
      # Cluster-internal http to Keycloak — same justification as
      # the identity plugins' insecure_http.
      insecure_http: true
      client_id: "cpex-gateway"
      client_secret_source:
        kind: file
        path: /etc/cpex-secrets/client-secret
      timeout_seconds: 5
      default_outbound_header: "Authorization"

  # Second delegator — same plugin kind, different audience.
  #
  # Pattern 3 (github flow): the user's inbound token does NOT
  # carry github perms. The github-api client in Keycloak has a
  # per-audience claim mapper (`gh-permissions-as-scope`) that
  # injects `gh_permissions` from the user attribute as the
  # minted token's `permissions` claim. The IdP is the source of
  # system-specific perm truth; the gateway just asks.
  - name: github-oauth
    kind: delegator/oauth
    hooks: [token.delegate]
    on_error: fail   # delegation failure must BLOCK the call. search_repos also
                     # has a granted-permissions post-check, but fail-closed here
                     # keeps a transport/exchange error from ever slipping through.
    capabilities:
      - read_inbound_credentials
      - write_delegated_tokens
    config:
      token_endpoint: "http://keycloak.cpex-demo:8080/realms/cpex-demo/protocol/openid-connect/token"
      # Cluster-internal http to Keycloak — same justification as
      # the identity plugins' insecure_http.
      insecure_http: true
      client_id: "cpex-gateway"
      client_secret_source:
        kind: file
        path: /etc/cpex-secrets/client-secret
      timeout_seconds: 5
      default_outbound_header: "Authorization"

  # ── VALIDATORS ───────────────────────────────────────────────────
  # pii-scan denies on sensitive patterns; audit-log observes and never
  # blocks. Routes invoke them via run(pii-scan) / run(audit-log).

  # ----------------------------------------------------------------
  # Field-level validator: PII scanner.
  # ----------------------------------------------------------------
  # Walks tool/prompt arguments looking for SSN / credit-card / email
  # patterns. If found in `deny` mode, refuses the request. Wired on
  # `cmf.tool_pre_invoke` so it fires before every tool call.
  - name: pii-scan
    kind: validator/pii-scan
    hooks: [cmf.tool_pre_invoke]
    on_error: fail
    config:
      detect:
        - { kind: ssn }
        - { kind: credit_card }
      mode: deny

  # ----------------------------------------------------------------
  # Observation: structured audit logger.
  # ----------------------------------------------------------------
  # Emits one JSON line per dispatched request capturing subject,
  # client, entity, tool args, and any delegation outcomes. Never
  # blocks — observation only. Wired on every CMF entity hook so
  # the audit trail covers all tool / prompt / resource traffic.
  # Placed LAST in each route's pre_invocation so the record reflects
  # the final decision + minted tokens.
  - name: audit-log
    kind: audit/logger
    hooks:
      - cmf.tool_pre_invoke
      - cmf.prompt_pre_invoke
      - cmf.resource_pre_fetch
    on_error: ignore  # observation failures don't halt traffic
    capabilities:
      - read_subject
      - read_client
      - read_meta
      - read_delegated_tokens
    config:
      destination: stderr
      source: cpex-demo-gateway

global:
  # ----------------------------------------------------------------
  # Cedar PDP — declarative authorization for relationship-based
  # decisions. The Cedar policies live inline below. APL routes
  # call into Cedar via `cedar:` steps and translate decisions
  # into allow/deny in the broader policy pipeline.
  #
  # Why Cedar here: pure APL predicates like `require(role.engineer)`
  # are great for flat principal attributes. Cedar shines when the
  # decision needs to relate principal attributes to resource
  # attributes (e.g. "engineers can read repos when the repo's
  # visibility is internal"). The two compose naturally — APL handles
  # the orchestration around Cedar's discrete decisions.
  # ----------------------------------------------------------------
  apl:
    pdp:
      - kind: cedar-direct
        dialect: cedar
        policy_text: |
          // Engineers can read INTERNAL repos. The relationship
          // (principal's role × resource's visibility) is the
          // archetypal Cedar shape.
          @id("engineering-internal-repos")
          permit(
            principal,
            action == Action::"read",
            resource is Repo
          ) when {
            principal.roles.contains("engineer") &&
            resource.visibility == "internal"
          };

          // Security team can read ANY repo regardless of visibility.
          @id("security-team-any-repo")
          permit(
            principal,
            action == Action::"read",
            resource is Repo
          ) when {
            principal.roles.contains("security")
          };

          // Default-deny otherwise — Cedar's defaults make this
          // implicit but spelling it out documents intent.

routes:
  # ════════════════════════════════════════════════════════════════
  # ACT 1 ·WORKDAY FLOW · scenarios 01-bob-allow / 03-eve-redact
  # ════════════════════════════════════════════════════════════════
  # Pattern 1 (centralized IdP knows all perms).
  # User token carries view_ssn directly; APL gates on a flat
  # role/perm predicate + redacts ssn on the wire if missing.
  # ----------------------------------------------------------------
  - tool: get_compensation
    authentication:
      - jwt-user
      - jwt-client
    authorization:
      pre_invocation:
        - "require(role.hr)"
        - "delegate(workday-oauth, target: workday-api, audience: workday-api, permissions: [read_compensation])"
        # Taint the session: reading compensation marks this session as
        # having touched secret data. The label persists in the CPEX
        # session store (keyed by Agent.SessionID, threaded from the
        # X-Session-Id header) and is checked later by send_email — a
        # data-flow control that spans two separate tool calls. See
        # ACT 4 / scenario 08.
        - "taint(secret, session)"
        # Emit a structured audit record AFTER the policy + delegate
        # decisions are in. Records who called what, with which scope.
        - "run(audit-log)"
    args:
      # `redact(!perm.view_ssn)` fires when the caller LACKS the
      # permission. The arg key remains, value becomes "[REDACTED]" —
      # downstream tool can see "ssn was here but you can't read it."
      ssn: "str | redact(!perm.view_ssn)"
    result:
      # Symmetric guard on the response side. The tool may include
      # the SSN in its result (it does, when include_ssn=true);
      # without this rule, a caller with role.hr but NOT
      # perm.view_ssn (e.g. eve) would receive it. Redacting on the
      # response closes the loop — the LLM-driven flow doesn't even
      # require the caller to mention `ssn` in args for the guard
      # to fire, because the SSN comes back unsolicited in the
      # upstream tool's response.
      ssn: "str | redact(!perm.view_ssn)"

  # ════════════════════════════════════════════════════════════════
  # ACT 2 · GITHUB FLOW · scenarios 04-alice-internal / 05-external / 06-bob
  # ════════════════════════════════════════════════════════════════
  # Pattern 3 (IdP per-audience mapping + Cedar PDP).
  #
  # Four authorization layers in one route:
  #
  #   1. APL gate     — cheap predicate. Short-circuits requests
  #                     from users who can't ever read repos.
  #   2. Cedar PDP    — relationship between principal role and
  #                     resource attributes (repo visibility).
  #                     This is what pure flat predicates struggle
  #                     with and what Cedar shines at.
  #   3. Delegation   — RFC 8693 to github-api audience. Keycloak's
  #                     per-audience mapper injects gh_permissions
  #                     into the `permissions` claim.
  #   4. Post-check   — verify the IdP actually granted enough.
  #                     If the IdP narrowed the scope, refuse to
  #                     forward — the token never reaches GitHub.
  # ----------------------------------------------------------------
  - tool: search_repos
    authentication:
      - jwt-user
      - jwt-client
    authorization:
      pre_invocation:
        # Layer 1 — coarse APL gate on group membership.
        - "require(team.engineering | team.security)"

        # Layer 2 — Cedar fine-grained authorization. The resource
        # type+id come from the tool args; the principal is built
        # from the user's token automatically (subject + roles).
        - cedar:
            action: 'Action::"read"'
            resource:
              type: Repo
              id: ${args.repo_name}
              attributes:
                visibility: ${args.visibility}

        # Layer 3 — Token exchange. Keycloak's github-api mapper
        # injects the user's gh_permissions as the `permissions`
        # claim on the minted token.
        - "delegate(github-oauth, target: github-api, audience: github-api, permissions: [repo:read:internal])"

        # Layer 4 — Verify the IdP granted enough. If the user's
        # gh_permissions attribute didn't include repo:read:internal,
        # the minted token comes back narrower than asked. Deny here
        # rather than forwarding an insufficient token.
        - "!(delegation.granted.permissions contains 'repo:read:internal'): deny"

        # Audit every github call.
        - "run(audit-log)"

  # ════════════════════════════════════════════════════════════════
  # ACT 3 · PII SCANNER · scenario 07-bob-pii-deny
  # ════════════════════════════════════════════════════════════════
  # SEND_EMAIL — PII scanner gate.
  #
  # The interesting flow: when the LLM composes an email body, it
  # might include raw PII pulled from earlier tool responses ("Bob's
  # SSN is 555-12-3456"). The PII scanner catches that before the
  # email goes out. Operators see the deny in real time on stderr
  # via the audit logger.
  # ----------------------------------------------------------------
  - tool: send_email
    authentication:
      - jwt-user
      - jwt-client
    authorization:
      pre_invocation:
        - "require(perm.email_send)"
        # Walks args.body / args.subject / args.to and denies if any
        # carries an SSN-like or credit-card-like pattern.
        - "run(pii-scan)"
        # ACT 4 · TAINT PROPAGATION · scenario 08-bob-taint-deny
        # Block external email from a session that previously accessed
        # secret data (get_compensation taints the session "secret").
        # Placed AFTER pii-scan deliberately: a body carrying PII still
        # denies via pii-scan (cpex.pii_detected) regardless of taint;
        # this rule catches the subtler case where the body is clean but
        # the SESSION is tainted. Denies even without any PII in args.
        # `taint(secret, session)` on get_compensation persists "secret" to
        # the CPEX session store; on the next request in that session it is
        # hydrated into `security.labels`, the attribute key the bag exposes
        # for labels (the DSL's `session.labels`/`message.labels` split is not
        # yet wired in the pinned FFI — labels surface uniformly under
        # `security.labels`). Session scope is what makes it survive to here.
        - "security.labels contains \"secret\": deny('external email blocked: this session accessed secret data', 'session_tainted_secret')"
        - "run(audit-log)"
