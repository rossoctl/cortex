# Client configurations with roles
# Each client can have multiple roles, each role gets its own audience scope
# Optional 'secret' parameter: if not provided, Keycloak will auto-generate the client secret
clients:
  - client_id: "kagenti"
    #secret: "demo-ui-secret-for-testing-do-not-use"
    direct_access_grants: true
    roles:
      - name: "demo-ui"
        description: "Access to the demo UI interface"
  - client_id: "spiffe://localtest.me/ns/team1/sa/git-issue-agent"
    #secret: "github-agent-secret-for-testing-do-not-use"
    direct_access_grants: true
    roles:
      - name: "github-agent"
        description: "Access to the GitHub agent service"
  - client_id: "github-tool"
    #secret: "github-tool-secret-for-testing-do-not-use"
    roles:
      - name: "github-tool-aud"
        description: "Provides access to public GitHub repositories"
      - name: "github-full-access"
        description: "Provides access to private GitHub repositories"

# Realm roles (can be composites of client roles)
realm_roles:
  - name: "developer"
    description: "R&D team members"
  - name: "tech-support"
    description: "Technical support staff providing customer assistance"
  - name: "sales"
    description: "Sales team members managing customer relationships"

# Client audience targets
client_audience_targets:
  kagenti:
    - spiffe://localtest.me/ns/team1/sa/git-issue-agent
  spiffe://localtest.me/ns/team1/sa/git-issue-agent:
    - github-tool
  github-tool: []

# User configurations
users:
  - username: "alice"
    roles:
      - "developer"

  - username: "bob"
    roles:
      - "tech-support"

  - username: "charlie"
    roles:
      - "sales"
