# Access Control Policy
# Maps user roles (realm roles) to specific client roles
# Format: user_role_name -> list of client role mappings
# Each entry specifies: client (client name) and role (role name from that client)

# Original Policy Description:
#   * Members of the R&D can access both private and public github repositories
#   * Other technical personnel can access public github repositories only
#
# LLM Mapping Explanation:
#   Explanation
#   - “Members of the R&D” are mapped to the realm role developer.
#   - “Other technical personnel” are mapped to the realm role tech‑support.
#   - Access to private and public GitHub repositories requires both client roles on the `github-tool` client: `github-full-access` (covers private) and `github-tool-aud` (covers public).
#   - Access to public repositories only requires the `github-tool-aud` role.
#   - The call chain to reach the GitHub tool is: `kagenti` → `git‑issue‑agent` → `github-tool`. Therefore every user who needs any GitHub access must also receive the entry‑point client role `demo-ui` on `kagenti` and the intermediate role `github-agent` on `git‑issue‑agent`.
#   - All required client‑role pairs are listed as separate objects, respecting the “both” rule.

policy:
  developer:
  - client: kagenti
    role: demo-ui
  - client: spiffe://localtest.me/ns/team1/sa/git-issue-agent
    role: github-agent
  - client: github-tool
    role: github-full-access
  - client: github-tool
    role: github-tool-aud
  tech-support:
  - client: kagenti
    role: demo-ui
  - client: spiffe://localtest.me/ns/team1/sa/git-issue-agent
    role: github-agent
  - client: github-tool
    role: github-tool-aud
