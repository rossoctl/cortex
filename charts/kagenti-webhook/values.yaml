# Default values for kagenti-webhook.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

image:
  repository: ghcr.io/kagenti/kagenti-extensions/kagenti-webhook
  pullPolicy: IfNotPresent
  tag: "__PLACEHOLDER__"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "kagenti-webhook"
namespaceOverride: "kagenti-webhook-system"

namespace:
  create: true

webhook:
  enabled: true
  enableClientRegistration: true
  # defaultAuthMode is the authentication mode to use when no explicit mode is set on a workload.
  # Options: "waypoint" (Istio ambient waypoint-based) or "sidecar" (legacy sidecar injection).
  # Default: "waypoint" — minimal resource overhead, centralized policy.
  # Set to "sidecar" for legacy behavior or when Istio ambient is not available.
  defaultAuthMode: waypoint
  certPath: /tmp/k8s-webhook-server/serving-certs
  certName: tls.crt
  certKey: tls.key
  port: 9443

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  kubectl.kubernetes.io/default-container: manager

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - "ALL"

service:
  type: ClusterIP
  port: 443
  targetPort: 9443

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  enabled: true
  port: 8443
  secure: true

leaderElection:
  enabled: false

certManager:
  enabled: true
  issuer:
    create: true
    name: kagenti-webhook-selfsigned-issuer

rbac:
  create: true

# Feature gates — highest-priority layer in the injection precedence chain.
# Set globalEnabled to false to disable ALL sidecar injection (kill switch).
# Set individual gates to false to disable specific sidecars cluster-wide.
featureGates:
  globalEnabled: true
  envoyProxy: true
  spiffeHelper: true
  clientRegistration: true
  # injectTools controls whether tool workloads (kagenti.io/type=tool) receive
  # sidecar injection. Defaults to false — tools are not injected by default.
  injectTools: false
  # perWorkloadConfigResolution controls whether namespace ConfigMaps/Secrets are
  # read on every admission request (true) or cached per namespace (false).
  # Default false — cached mode is faster and sufficient when namespace ConfigMaps
  # rarely change. Cache is cleared on webhook pod restart.
  perWorkloadConfigResolution: false
  # combinedSidecar controls whether sidecars are injected as a single combined
  # "authbridge" container (true) or as separate containers (false).
  # When true, envoy-proxy + spiffe-helper + client-registration are combined
  # into one container, reducing per-pod overhead from 3 sidecars to 1.
  # proxy-init is still injected as a separate init container.
  # Default false — existing separate-container behavior is preserved.
  combinedSidecar: false

# custom values for kagenti-webhook injection configuration
# This is your "source of truth" for platform defaults.
# These values are version-controlled with your chart.

defaults:
  # Container images with version tags
  images:
    envoyProxy: ghcr.io/kagenti/kagenti-extensions/envoy-with-processor:latest
    proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:latest
    spiffeHelper: ghcr.io/kagenti/kagenti-extensions/spiffe-helper:latest
    clientRegistration: ghcr.io/kagenti/kagenti-extensions/client-registration:latest
    # authbridge is the combined sidecar image (used when featureGates.combinedSidecar=true)
    authbridge: ghcr.io/kagenti/kagenti-extensions/authbridge:latest
    pullPolicy: IfNotPresent

  # Proxy settings
  proxy:
    port: 15123
    uid: 1337
    adminPort: 9901
    inboundProxyPort: 15124

  # Resource defaults (conservative for dev)
  # Note: requests must be <= limits
  resources:
    envoyProxy:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    proxyInit:
      requests:
        cpu: 10m
        memory: 10Mi
      limits:
        cpu: 10m
        memory: 10Mi
    spiffeHelper:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    clientRegistration:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    # authbridge is the combined sidecar (used when featureGates.combinedSidecar=true).
    # Resource budget covers envoy + go-processor + spiffe-helper + client-registration.
    authbridge:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi

  # Per-sidecar enable/disable at the platform level (lowest-priority layer).
  # These are overridden by feature gates, namespace labels, and workload labels.
  sidecars:
    envoyProxy:
      enabled: true
    spiffeHelper:
      enabled: true
    clientRegistration:
      enabled: true
