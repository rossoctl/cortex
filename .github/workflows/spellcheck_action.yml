name: Spellcheck Action
on:
  pull_request:
    branches:
      - main
      - "release-*"
  push:
    branches:
      - main

jobs:
  spellcheck:
    # disable spell check with 'false' value.
    if: false
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Check spelling
        uses: rojopolis/spellcheck-github-actions@ca94733232ec8328061aea8018dfcb4959857eea  # 0.61.0
        with:
          config_path: .github/spellcheck/.spellcheck.yml
          task_name: Markdown
