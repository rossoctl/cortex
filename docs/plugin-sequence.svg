<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="1500" viewBox="0 0 1380 1500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="msg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="ret" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="deny" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .title   { font-size: 25px; font-weight: 700; fill: #0f172a; }
      .sub     { font-size: 13px; fill: #475569; }
      .cfg     { font-size: 12px; fill: #334155; }
      .mono    { font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .head    { font-size: 12.5px; font-weight: 700; fill: #ffffff; }
      .headsub { font-size: 10px; fill: #e2e8f0; }
      .msg     { font-size: 12px; fill: #1e293b; }
      .msgmono { font-size: 11px; fill: #1e293b; font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .ret     { font-size: 11px; fill: #64748b; font-style: italic; }
      .denylbl { font-size: 11px; fill: #b91c1c; font-weight: 600; }
      .phase   { font-size: 14px; font-weight: 700; fill: #0f172a; }
      .note    { font-size: 11px; fill: #475569; }
      .num     { font-size: 11px; font-weight: 700; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1380" height="1500" fill="#f8fafc"/>

  <text x="40" y="44" class="title">AuthBridge — Plugin Pipeline Sequence (inbound validation → outbound exchange)</text>
  <text x="40" y="66" class="sub">A request enters the agent (inbound pass), the agent calls a tool (outbound pass). Pipelines dispatch in declaration order on the request phase (pipeline.go:104).</text>

  <!-- Example config box -->
  <rect x="40" y="82" width="1300" height="70" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="54" y="102" class="cfg" font-weight="700">Example config (authbridge-runtime, abbreviated):</text>
  <text x="54" y="122" class="cfg mono">pipeline.inbound:  [ jwt-validation, a2a-parser ]</text>
  <text x="54" y="140" class="cfg mono">pipeline.outbound: [ mcp-parser, ibac, token-exchange ]      session.enabled: true   ·   routes.yaml: { host: github-tool-mcp → aud: github-tool }</text>

  <!-- ===================== LIFELINES ===================== -->
  <!-- x positions -->
  <!-- Caller 95 | Listener 250 | jwt 420 | a2a 580 | mcp 740 | ibac 900 | tokex 1075 | Session 1230 | External 1330(no head, use Session+ext) -->
  <!-- We'll use 9 lifelines -->

  <!-- Lifeline headers -->
  <g>
    <!-- Caller / App -->
    <rect x="48" y="168" width="120" height="46" rx="6" fill="#0f172a"/>
    <text x="108" y="190" text-anchor="middle" class="head">Caller / App</text>
    <text x="108" y="205" text-anchor="middle" class="headsub">user · then agent egress</text>

    <!-- Listener+Pipeline -->
    <rect x="196" y="168" width="138" height="46" rx="6" fill="#334155"/>
    <text x="265" y="186" text-anchor="middle" class="head">Listener +</text>
    <text x="265" y="200" text-anchor="middle" class="head">Pipeline.Run</text>
    <text x="265" y="211" text-anchor="middle" class="headsub">extproc / proxy</text>

    <!-- jwt-validation -->
    <rect x="362" y="168" width="120" height="46" rx="6" fill="#1e3a8a"/>
    <text x="422" y="190" text-anchor="middle" class="head">jwt-validation</text>
    <text x="422" y="205" text-anchor="middle" class="headsub">auth · inbound</text>

    <!-- a2a-parser -->
    <rect x="510" y="168" width="120" height="46" rx="6" fill="#0f766e"/>
    <text x="570" y="190" text-anchor="middle" class="head">a2a-parser</text>
    <text x="570" y="205" text-anchor="middle" class="headsub">parser · inbound</text>

    <!-- mcp-parser -->
    <rect x="658" y="168" width="120" height="46" rx="6" fill="#0f766e"/>
    <text x="718" y="190" text-anchor="middle" class="head">mcp-parser</text>
    <text x="718" y="205" text-anchor="middle" class="headsub">parser · outbound</text>

    <!-- ibac -->
    <rect x="806" y="168" width="120" height="46" rx="6" fill="#7c2d12"/>
    <text x="866" y="190" text-anchor="middle" class="head">ibac</text>
    <text x="866" y="205" text-anchor="middle" class="headsub">guardrail · outbound</text>

    <!-- token-exchange -->
    <rect x="954" y="168" width="124" height="46" rx="6" fill="#92400e"/>
    <text x="1016" y="190" text-anchor="middle" class="head">token-exchange</text>
    <text x="1016" y="205" text-anchor="middle" class="headsub">outbound</text>

    <!-- session.Store -->
    <rect x="1106" y="168" width="120" height="46" rx="6" fill="#0d9488"/>
    <text x="1166" y="190" text-anchor="middle" class="head">session.Store</text>
    <text x="1166" y="205" text-anchor="middle" class="headsub">per-pod, in-memory</text>

    <!-- External (JWKS/Judge/IdP) -->
    <rect x="1254" y="168" width="108" height="46" rx="6" fill="#475569"/>
    <text x="1308" y="186" text-anchor="middle" class="head">External</text>
    <text x="1308" y="200" text-anchor="middle" class="headsub">JWKS · Judge</text>
    <text x="1308" y="210" text-anchor="middle" class="headsub">LLM · IdP</text>
  </g>

  <!-- Lifelines (dashed) -->
  <g stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4">
    <line x1="108"  y1="214" x2="108"  y2="1440"/>
    <line x1="265"  y1="214" x2="265"  y2="1440"/>
    <line x1="422"  y1="214" x2="422"  y2="1440"/>
    <line x1="570"  y1="214" x2="570"  y2="1440"/>
    <line x1="718"  y1="214" x2="718"  y2="1440"/>
    <line x1="866"  y1="214" x2="866"  y2="1440"/>
    <line x1="1016" y1="214" x2="1016" y2="1440"/>
    <line x1="1166" y1="214" x2="1166" y2="1440"/>
    <line x1="1308" y1="214" x2="1308" y2="1440"/>
  </g>

  <!-- ===================== PHASE 1: INBOUND ===================== -->
  <rect x="40" y="236" width="1300" height="26" rx="4" fill="#dcfce7"/>
  <rect x="40" y="236" width="6" height="26" fill="#16a34a"/>
  <text x="56" y="254" class="phase" fill="#166534">INBOUND PASS — caller → agent  (Pipeline.Run, declaration order: jwt-validation, then a2a-parser)</text>

  <!-- 1: Caller -> Listener : inbound request -->
  <line x1="108" y1="288" x2="262" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="120" cy="288" r="8" fill="#16a34a"/><text x="120" y="292" text-anchor="middle" class="num">1</text>
  <text x="128" y="282" class="msgmono">POST /  (Bearer JWT, A2A message/send body)</text>

  <!-- 2: Listener -> jwt : OnRequest -->
  <line x1="265" y1="320" x2="418" y2="320" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="277" cy="320" r="8" fill="#16a34a"/><text x="277" y="324" text-anchor="middle" class="num">2</text>
  <text x="285" y="314" class="msgmono">OnRequest(pctx)</text>

  <!-- 3: jwt -> External : JWKS verify -->
  <line x1="422" y1="350" x2="1304" y2="350" stroke="#334155" stroke-width="1.4" marker-end="url(#msg)"/>
  <circle cx="434" cy="350" r="8" fill="#16a34a"/><text x="434" y="354" text-anchor="middle" class="num">3</text>
  <text x="442" y="344" class="msg">HandleInbound → verify signature / issuer / audience against JWKS</text>
  <line x1="1304" y1="372" x2="424" y2="372" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="442" y="388" class="ret">Claims { sub, scopes } (or → DENY 401 here, pipeline stops)</text>

  <!-- 4: jwt sets identity (self) -->
  <rect x="416" y="404" width="150" height="20" rx="4" fill="#eff6ff" stroke="#1e3a8a"/>
  <circle cx="434" cy="414" r="8" fill="#16a34a"/><text x="434" y="418" text-anchor="middle" class="num">4</text>
  <text x="448" y="418" class="msgmono">pctx.Identity = Claims</text>
  <line x1="418" y1="430" x2="267" y2="430" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="285" y="446" class="ret">Continue (Invocation: allow / authorized)</text>

  <!-- 5: Listener -> a2a : OnRequest -->
  <line x1="265" y1="476" x2="566" y2="476" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="277" cy="476" r="8" fill="#16a34a"/><text x="277" y="480" text-anchor="middle" class="num">5</text>
  <text x="285" y="470" class="msgmono">OnRequest(pctx)   // reads body</text>

  <!-- 6: a2a self - parse -->
  <rect x="500" y="492" width="240" height="36" rx="4" fill="#ecfdf5" stroke="#0f766e"/>
  <circle cx="518" cy="510" r="8" fill="#16a34a"/><text x="518" y="514" text-anchor="middle" class="num">6</text>
  <text x="532" y="506" class="msgmono">parse JSON-RPC →</text>
  <text x="532" y="521" class="msgmono">pctx.Extensions.A2A {SessionID, IsAction}</text>
  <line x1="500" y1="540" x2="267" y2="540" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="285" y="556" class="ret">Continue (Invocation: observe)</text>

  <!-- 7: Listener -> Session : Append inbound event -->
  <line x1="265" y1="590" x2="1162" y2="590" stroke="#0d9488" stroke-width="1.8" marker-end="url(#msg)"/>
  <circle cx="277" cy="590" r="8" fill="#0d9488"/><text x="277" y="594" text-anchor="middle" class="num">7</text>
  <text x="285" y="584" class="msg" fill="#0f766e">Sessions.Append(A2A.SessionID, event{Inbound, Request, A2A, Identity})  — pipeline done, listener records</text>
  <text x="285" y="606" class="note">SessionID comes from pctx.Extensions.A2A.SessionID (fallback "default"); store pins this intent vs FIFO eviction</text>

  <!-- 8: Listener -> Caller/App : forward to app -->
  <line x1="262" y1="636" x2="110" y2="636" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="250" cy="636" r="8" fill="#16a34a"/><text x="250" y="640" text-anchor="middle" class="num">8</text>
  <text x="120" y="630" class="msgmono">forward validated request → application</text>

  <!-- ===================== PHASE 2: OUTBOUND ===================== -->
  <rect x="40" y="668" width="1300" height="26" rx="4" fill="#ffedd5"/>
  <rect x="40" y="668" width="6" height="26" fill="#c2410c"/>
  <text x="56" y="686" class="phase" fill="#9a3412">OUTBOUND PASS — agent → tool  (Pipeline.Run, declaration order: mcp-parser, ibac, token-exchange)</text>

  <!-- 9: App -> Listener : outbound tool call -->
  <line x1="108" y1="720" x2="262" y2="720" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="120" cy="720" r="8" fill="#c2410c"/><text x="120" y="724" text-anchor="middle" class="num">9</text>
  <text x="128" y="714" class="msgmono">POST github-tool-mcp  (tools/call, Bearer JWT)</text>

  <!-- 10: Listener -> mcp : OnRequest -->
  <line x1="265" y1="752" x2="714" y2="752" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="277" cy="752" r="8" fill="#c2410c"/><text x="277" y="756" text-anchor="middle" class="num">10</text>
  <text x="285" y="746" class="msgmono">OnRequest(pctx)   // reads body</text>

  <!-- 11: mcp self parse -->
  <rect x="648" y="768" width="240" height="36" rx="4" fill="#ecfdf5" stroke="#0f766e"/>
  <circle cx="666" cy="786" r="8" fill="#c2410c"/><text x="666" y="790" text-anchor="middle" class="num">11</text>
  <text x="680" y="782" class="msgmono">parse JSON-RPC →</text>
  <text x="680" y="797" class="msgmono">pctx.Extensions.MCP {tools/call, IsAction=true}</text>
  <line x1="648" y1="816" x2="267" y2="816" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="285" y="832" class="ret">Continue (Invocation: observe)</text>

  <!-- 12: Listener -> ibac : OnRequest -->
  <line x1="265" y1="862" x2="862" y2="862" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="277" cy="862" r="8" fill="#c2410c"/><text x="277" y="856" text-anchor="middle" class="num">12</text>
  <text x="285" y="856" class="msgmono">OnRequest(pctx)</text>

  <!-- 13: ibac classification gate (self) -->
  <rect x="806" y="878" width="220" height="20" rx="4" fill="#fef2f2" stroke="#7c2d12"/>
  <circle cx="824" cy="888" r="8" fill="#c2410c"/><text x="824" y="892" text-anchor="middle" class="num">13</text>
  <text x="838" y="892" class="msgmono">Classification(): anyAction?</text>

  <!-- 14: ibac -> Session : read LastIntent (via pctx.Session snapshot) -->
  <line x1="866" y1="922" x2="1162" y2="922" stroke="#0d9488" stroke-width="1.8" marker-end="url(#msg)"/>
  <circle cx="878" cy="922" r="8" fill="#0d9488"/><text x="878" y="926" text-anchor="middle" class="num">14</text>
  <text x="886" y="916" class="msg" fill="#0f766e">pctx.Session.LastIntent()</text>
  <line x1="1162" y1="944" x2="868" y2="944" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="886" y="960" class="ret">inbound A2A intent event (user's original request)</text>
  <text x="886" y="974" class="note">walks events backwards for Inbound+Request+A2A (session.go LastIntent)</text>

  <!-- 15: ibac -> External : judge evaluate -->
  <line x1="866" y1="1004" x2="1304" y2="1004" stroke="#334155" stroke-width="1.4" marker-end="url(#msg)"/>
  <circle cx="878" cy="1004" r="8" fill="#c2410c"/><text x="878" y="1008" text-anchor="middle" class="num">15</text>
  <text x="886" y="998" class="msg">judge.Evaluate(intentText, describeAction(MCP tool+args))</text>
  <line x1="1304" y1="1026" x2="868" y2="1026" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="886" y="1042" class="ret">verdict: allow | deny  (fail-closed on error / uncertain)</text>

  <!-- 16: ibac -> Listener : continue or DENY -->
  <line x1="862" y1="1072" x2="267" y2="1072" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <circle cx="850" cy="1072" r="8" fill="#c2410c"/><text x="850" y="1076" text-anchor="middle" class="num">16</text>
  <text x="285" y="1066" class="ret">Continue if intent aligns</text>
  <text x="640" y="1066" class="denylbl">…or DENY 403 (intent mismatch) — pipeline stops, no token issued</text>

  <!-- 17: Listener -> token-exchange : OnRequest -->
  <line x1="265" y1="1108" x2="1012" y2="1108" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="277" cy="1108" r="8" fill="#c2410c"/><text x="277" y="1112" text-anchor="middle" class="num">17</text>
  <text x="285" y="1102" class="msgmono">OnRequest(pctx)</text>

  <!-- 18: tokex self - resolve route + cache -->
  <rect x="954" y="1124" width="210" height="36" rx="4" fill="#fffbeb" stroke="#92400e"/>
  <circle cx="972" cy="1142" r="8" fill="#c2410c"/><text x="972" y="1146" text-anchor="middle" class="num">18</text>
  <text x="986" y="1138" class="msgmono">Router.Resolve(Host) → aud</text>
  <text x="986" y="1153" class="msgmono">Cache.Get(SHA256(token‖aud))</text>

  <!-- 19: tokex -> External : RFC 8693 exchange (cache miss) -->
  <line x1="1016" y1="1186" x2="1304" y2="1186" stroke="#334155" stroke-width="1.4" marker-end="url(#msg)"/>
  <circle cx="1028" cy="1186" r="8" fill="#c2410c"/><text x="1028" y="1190" text-anchor="middle" class="num">19</text>
  <text x="1036" y="1180" class="msg" text-anchor="end" transform="rotate(0)">RFC 8693</text>
  <text x="1024" y="1180" class="msgmono" text-anchor="end">Exchange(subject_token, audience, scopes) → IdP</text>
  <line x1="1304" y1="1208" x2="1018" y2="1208" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="1024" y="1224" class="ret" text-anchor="end">new access_token (cached for next time)</text>

  <!-- 20: tokex self - replace header -->
  <rect x="954" y="1238" width="210" height="20" rx="4" fill="#fffbeb" stroke="#92400e"/>
  <circle cx="972" cy="1248" r="8" fill="#c2410c"/><text x="972" y="1252" text-anchor="middle" class="num">20</text>
  <text x="986" y="1252" class="msgmono">Headers["Authorization"]=Bearer</text>
  <line x1="954" y1="1264" x2="267" y2="1264" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="285" y="1280" class="ret">Continue (Invocation: modify / token_replaced)</text>

  <!-- 21: Listener -> Session : append outbound event -->
  <line x1="265" y1="1310" x2="1162" y2="1310" stroke="#0d9488" stroke-width="1.8" marker-end="url(#msg)"/>
  <circle cx="277" cy="1310" r="8" fill="#0d9488"/><text x="277" y="1314" text-anchor="middle" class="num">21</text>
  <text x="285" y="1304" class="msg" fill="#0f766e">Sessions.Append(pctx.OutboundSessionID, event{Outbound, Request, MCP, Host})  — pinned to same session bucket</text>

  <!-- 22: Listener -> Caller/App : forward to tool -->
  <line x1="262" y1="1346" x2="110" y2="1346" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <circle cx="250" cy="1346" r="8" fill="#c2410c"/><text x="250" y="1350" text-anchor="middle" class="num">22</text>
  <text x="120" y="1340" class="msgmono">forward to github-tool-mcp with exchanged token</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="1376" width="1300" height="96" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="54" y="1396" class="cfg" font-weight="700">Reading the diagram</text>
  <line x1="60" y1="1414" x2="100" y2="1414" stroke="#334155" stroke-width="1.6" marker-end="url(#msg)"/>
  <text x="110" y="1418" class="note">solid = synchronous call</text>
  <line x1="280" y1="1414" x2="320" y2="1414" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="330" y="1418" class="note">dashed = return / continue</text>
  <line x1="520" y1="1414" x2="560" y2="1414" stroke="#0d9488" stroke-width="1.8" marker-end="url(#msg)"/>
  <text x="570" y="1418" class="note">teal = session store I/O (record intent / read intent)</text>
  <text x="980" y="1418" class="denylbl">red text = a point where the pipeline can DENY and stop</text>
  <text x="54" y="1444" class="note">Auth (jwt-validation) gates inbound and sets pctx.Identity → Parsers (a2a/mcp) record protocol + SessionID into the session store → Guardrail (ibac) reads the recorded</text>
  <text x="54" y="1460" class="note">user intent (LastIntent) to judge the outbound tool call → Outbound (token-exchange) resolves the route and swaps in an audience-scoped token. Response phase runs in reverse order (omitted).</text>
</svg>
